<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Transcritor de Áudio IA</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <!-- Apple Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Transcritor IA" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/isometric/192/microphone.png" />
  </head>
  <body class="bg-stone-50 select-none antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register simple service worker for PWA installation capability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => console.log('Service Worker registrado.', reg))
            .catch((err) => console.log('Erro ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
